
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sudoku Solver</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Sudoku Solver</h1>
    <p class="subtitle">Enter numbers and click Solve</p>

    <div id="board" class="board"></div>

    <div class="buttons">
      <button id="solveBtn">Solve Puzzle</button>
      <button id="clearBtn">Clear</button>
      <button id="sampleBtn">Load Sample</button>
    </div>

    <div class="info">
      <h3>Features</h3>
      <ul>
        <li>Beautiful responsive UI</li>
        <li>Fast backtracking algorithm</li>
        <li>Input validation</li>
        <li>Works directly in browser</li>
      </ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
